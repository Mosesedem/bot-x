name: bot-x
region: lon1

services:
  - name: xgateway
    dockerfile_path: services/xgateway/Dockerfile
    source_dir: .
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    http_port: 8080
    internal_ports:
      - 50051
    routes:
      - path: /
    health_check:
      http_path: /health
      port: 8080
    envs:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: BASE_URL
        value: https://app.example.com
      - key: DATABASE_URL
        value: postgresql://botx_user:password@cockroach.example.com:26257/instantf_bot_x?sslmode=verify-full
      - key: REDIS_URL
        value: rediss://default:password@redis.example.com:25061
      - key: GRPC_GIVEAWAY_ADDR
        value: giveaway:50052
      - key: GRPC_ENTRY_ADDR
        value: entry:50053
      - key: GRPC_PAYMENT_ROUTER_ADDR
        value: payment-router:50054
      - key: GRPC_KYC_ADDR
        value: kyc:50055
      - key: GRPC_COMPLIANCE_ADDR
        value: compliance:50056
      - key: GRPC_AUDIT_ADDR
        value: audit:50057
      - key: GRPC_NOTIFICATION_ADDR
        value: notification:50058
      - key: GRPC_RECONCILIATION_ADDR
        value: reconciliation:50059
      - key: X_CONSUMER_KEY
        value: replace-me
      - key: X_CONSUMER_SECRET
        value: replace-me
      - key: X_ACCESS_TOKEN
        value: replace-me
      - key: X_ACCESS_SECRET
        value: replace-me
      - key: X_BEARER_TOKEN
        value: replace-me
      - key: X_WEBHOOK_SECRET
        value: replace-me
      - key: BOT_TWITTER_ID
        value: replace-me
      - key: BOT_TWITTER_HANDLE
        value: instantf_bot

  - name: giveaway
    dockerfile_path: services/giveaway/Dockerfile
    source_dir: .
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    http_port: 50052
    envs:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: BASE_URL
        value: https://app.example.com
      - key: DATABASE_URL
        value: postgresql://botx_user:password@cockroach.example.com:26257/instantf_bot_x?sslmode=verify-full
      - key: GRPC_ENTRY_ADDR
        value: entry:50053
      - key: GRPC_KYC_ADDR
        value: kyc:50055
      - key: GRPC_NOTIFICATION_ADDR
        value: notification:50058
      - key: GRPC_PAYMENT_ROUTER_ADDR
        value: payment-router:50054
      - key: GRPC_AUDIT_ADDR
        value: audit:50057
      - key: ADMIN_JWT_SECRET
        value: replace-me

  - name: entry
    dockerfile_path: services/entry/Dockerfile
