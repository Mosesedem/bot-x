    http_port: 50053
    envs:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        value: postgresql://botx_user:password@cockroach.example.com:26257/instantf_bot_x?sslmode=verify-full

  - name: payment-router
