services:
  # ── Infrastructure ──

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "9000:9000"
      - "8123:8123"
    environment:
      - CLICKHOUSE_DB=instantf_audit
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.17.1
    env_file:
      - .env
    environment:
      DATABASE_URL: "${DATABASE_URL}"
    volumes:
      - ./migrations:/migrations:ro
    command: ["-path", "/migrations", "-database", "${DATABASE_URL}", "up"]
    restart: "no"

  # ── Microservices ──
  xgateway:
    build:
      context: .
      dockerfile: services/xgateway/Dockerfile
    ports:
      - "8081:8080"
      - "50051:50051"
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully

  giveaway:
    build:
      context: .
      dockerfile: services/giveaway/Dockerfile
    ports:
      - "8082:8080"
      - "50052:50052"
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully

  entry:
    build:
      context: .
      dockerfile: services/entry/Dockerfile
    ports:
      - "8083:8080"
      - "50053:50053"
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully

  payment-router:
    build:
      context: .
      dockerfile: services/payment-router/Dockerfile
    ports:
      - "8084:8080"
      - "50054:50054"
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully

  kyc:
    build:
      context: .
      dockerfile: services/kyc/Dockerfile
    ports:
      - "8085:8080"
      - "50055:50055"
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully

  compliance:
    build:
      context: .
      dockerfile: services/compliance/Dockerfile
    ports:
      - "8086:8080"
      - "50056:50056"
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully

  audit:
    build:
      context: .
      dockerfile: services/audit/Dockerfile
    ports:
      - "8087:8080"
      - "50057:50057"
    env_file:
      - .env
    depends_on:
      clickhouse:
        condition: service_healthy

  notification:
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    ports:
      - "8088:8080"
      - "50058:50058"
    env_file:
      - .env
    depends_on:
      - xgateway

  reconciliation:
    build:
      context: .
      dockerfile: services/reconciliation/Dockerfile
    ports:
      - "8089:8080"
      - "50059:50059"
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully

  admin:
    build:
      context: .
      dockerfile: services/admin/Dockerfile
    ports:
      - "8090:8080"
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  clickhouse_data:
