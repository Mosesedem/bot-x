# ============================================================
#  bot-x — Production Docker Compose for Ubuntu Instance
#  Stack: Go microservices + Redis + ClickHouse + (External CockroachDB)
# ============================================================

services:
  # ── Infrastructure Services ──────────────────────────────

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:8123:8123"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 10s
      retries: 15

  # ── Database Migrations (runs once on deploy) ─────────────

  migrate:
    image: migrate/migrate:v4.17.1
    env_file:
      - .env
    volumes:
      - ./migrations/cockroach:/migrations:ro
    command: ["-path", "/migrations", "-database", "${DATABASE_URL}", "up"]
    restart: "no"

  migrate_clickhouse:
    image: migrate/migrate:v4.17.1
    env_file:
      - .env
    volumes:
      - ./migrations/clickhouse:/migrations:ro
    command: ["-path", "/migrations", "-database", "clickhouse://default:${CLICKHOUSE_PASSWORD}@clickhouse:9000?x-multi-statement=true", "up"]
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"

  # ── Microservices ────────────────────────────────────────

  xgateway:
    build:
      context: .
      dockerfile: services/xgateway/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8081:8080"    # HTTP API
      - "50051:50051"  # gRPC
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  giveaway:
    build:
      context: .
      dockerfile: services/giveaway/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8082:8080"
      - "50052:50052"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  entry:
    build:
      context: .
      dockerfile: services/entry/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8083:8080"
      - "50053:50053"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  payment-router:
    build:
      context: .
      dockerfile: services/payment-router/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8084:8080"
      - "50054:50054"
    depends_on:
      migrate:
        condition: service_completed_successfully

  kyc:
    build:
      context: .
      dockerfile: services/kyc/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8085:8080"
      - "50055:50055"

  compliance:
    build:
      context: .
      dockerfile: services/compliance/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8086:8080"
      - "50056:50056"

  audit:
    build:
      context: .
      dockerfile: services/audit/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8087:8080"
      - "50057:50057"
    depends_on:
      migrate_clickhouse:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy

  notification:
    build:
      context: .
      dockerfile: services/notification/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8088:8080"
      - "50058:50058"
    depends_on:
      - xgateway
      - redis

  reconciliation:
    build:
      context: .
      dockerfile: services/reconciliation/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8089:8080"
      - "50059:50059"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: services/admin/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8090:8080"  # Only accessible from localhost (use SSH tunnel or VPN)
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  redis_data:
  clickhouse_data:
