# ============================================================
#  Nginx Configuration for bot-x on Digital Ocean Droplet
#  Place this in /etc/nginx/sites-available/bot-x
#  Then: ln -s /etc/nginx/sites-available/bot-x /etc/nginx/sites-enabled/
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=webhook:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

upstream xgateway {
    server 127.0.0.1:8080;
    keepalive 32;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name api.mosesedem.me;  # CHANGE THIS

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name api.mosesedem.me;  # CHANGE THIS

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/api.mosesedem.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mosesedem.me/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy settings
    location / {
        proxy_pass http://xgateway;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Webhook endpoint with stricter rate limiting
    location /webhook/twitter {
        limit_req zone=webhook burst=100 nodelay;
        proxy_pass http://xgateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint (no rate limiting)
    location /health {
        proxy_pass http://xgateway;
        access_log off;
    }

    # API endpoints with standard rate limiting
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://xgateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
